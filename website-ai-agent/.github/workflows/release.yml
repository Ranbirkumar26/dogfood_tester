name: Release

# Tag-driven release: build the wheel and sdist, publish to PyPI via Trusted Publishing (no
# stored token), and attach the artifacts to the GitHub Release. Publishing requires a PyPI
# project configured for this repository's OIDC identity; until that is set up, the build job
# still runs and uploads artifacts, and the publish job is a no-op without the environment.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing needs this environment; configure it in repo settings to enable.
    environment: pypi
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

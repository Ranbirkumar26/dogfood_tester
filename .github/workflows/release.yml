name: Release

# Tag-driven release for the project in website-ai-agent/. Builds the wheel and sdist and
# publishes to PyPI via Trusted Publishing (OIDC, no stored token). The build job always
# uploads artifacts; publish activates once the PyPI environment is configured in repo settings.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

defaults:
  run:
    working-directory: website-ai-agent

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: website-ai-agent/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
